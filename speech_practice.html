<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="口說練習">
<meta name="theme-color" content="#ffffff">
<title>口說練習 — EN / JP</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #666; --text3: #999;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 12px; --radius-sm: 8px; --radius-pill: 999px;
    --red: #E24B4A; --red-bg: #FCEBEB;
    --green: #1D9E75; --amber: #BA7517;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --bg2: #252525; --bg3: #2e2e2e;
      --text: #f0f0f0; --text2: #aaa; --text3: #666;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --red-bg: #3a1a1a;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding: 16px; padding-bottom: 32px; max-width: 640px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  h1 span { font-size: 13px; font-weight: 400; color: var(--text3); }

  /* API Key setup screen */
  #setupScreen { display: flex; flex-direction: column; gap: 12px; padding: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
  #setupScreen h2 { font-size: 15px; font-weight: 600; }
  #setupScreen p { font-size: 13px; color: var(--text2); line-height: 1.6; }
  #setupScreen input { width: 100%; padding: 10px 13px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); font-size: 13px; color: var(--text); font-family: monospace; }
  #setupScreen input:focus { outline: none; border-color: var(--text); }
  #saveKeyBtn { padding: 10px 20px; border: none; border-radius: var(--radius-sm); background: var(--text); color: var(--bg); font-size: 14px; font-weight: 500; cursor: pointer; }
  #keyStatus { font-size: 12px; color: var(--green); display: none; }
  #changeKeyBtn { font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; text-decoration: underline; display: none; }

  .row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .pill-btn { padding: 6px 16px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; }
  .pill-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .pill-btn:hover:not(.active) { border-color: var(--border2); color: var(--text); }

  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 14px; }
  .topic-btn { padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg2); cursor: pointer; font-size: 13px; color: var(--text2); text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .topic-btn.active { border-color: var(--border2); color: var(--text); background: var(--bg); font-weight: 500; }
  .topic-btn:hover:not(.active) { border-color: var(--border2); color: var(--text); }

  .chat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; min-height: 260px; max-height: min(360px, 45dvh); overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
  .msg { max-width: 82%; display: flex; flex-direction: column; gap: 3px; }
  .msg.ai { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .msg-label { font-size: 11px; color: var(--text3); padding: 0 3px; }
  .msg.user .msg-label { text-align: right; }
  .bubble { padding: 10px 13px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; }
  .msg.ai .bubble { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
  .msg.user .bubble { background: var(--text); color: var(--bg); }
  .correction { font-size: 12px; color: var(--text3); padding: 4px 13px; border-left: 2px solid var(--border2); margin-top: 2px; font-style: italic; }
  .replay-btn { font-size: 11px; color: var(--text3); background: none; border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 3px 10px; cursor: pointer; margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; transition: all 0.12s; width: fit-content; }
  .replay-btn:hover { color: var(--text); border-color: var(--border2); }

  .controls { display: flex; gap: 10px; align-items: flex-end; }
  .mic-btn { width: 54px; height: 54px; border-radius: 50%; border: 1px solid var(--border2); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.15s; flex-shrink: 0; }
  .mic-btn.recording { border-color: var(--red); background: var(--red-bg); animation: pulse 1s ease-in-out infinite; }
  .mic-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

  .input-wrap { flex: 1; }
  textarea { width: 100%; padding: 12px 13px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-size: 14px; color: var(--text); font-family: inherit; resize: none; height: 54px; line-height: 1.4; }
  textarea:focus { outline: none; border-color: var(--border2); }
  .send-btn { padding: 0 18px; height: 54px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text); flex-shrink: 0; transition: all 0.15s; }
  .send-btn:hover { background: var(--bg2); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: var(--text3); min-height: 18px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .dot.listening { background: var(--red); animation: pulse 0.8s infinite; }
  .dot.thinking { background: var(--amber); animation: pulse 0.9s infinite; }
  .dot.speaking { background: var(--green); animation: pulse 0.7s infinite; }

  .error-box { margin-top: 10px; padding: 10px 13px; background: var(--bg3); border-radius: var(--radius-sm); font-size: 13px; color: var(--text2); display: none; }
  .speed-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; font-size: 13px; color: var(--text2); }
  .speed-row input[type=range] { flex: 1; accent-color: var(--text); }
  .speed-row span { min-width: 32px; font-size: 12px; color: var(--text3); text-align: right; }

  #mainApp { display: none; }

  @media (max-width: 400px) {
    body { padding: 12px; }
    .topic-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<h1>🗣️ 口說練習 <span>EN &amp; JP</span></h1>

<!-- API Key Setup -->
<div id="setupScreen">
  <h2>🔑 設定 API Key</h2>
  <p>請貼上你的 Anthropic API Key（<code>sk-ant-</code> 開頭）。Key 只存在你的瀏覽器裡，不會上傳到任何地方。</p>
  <input type="password" id="keyInput" placeholder="sk-ant-api03-..." autocomplete="off">
  <button id="saveKeyBtn" onclick="saveKey()">儲存並開始</button>
  <span id="keyStatus">✓ Key 已儲存</span>
</div>

<!-- Main App -->
<div id="mainApp">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <div class="row" id="langRow" style="margin-bottom:0">
      <button class="pill-btn active" onclick="setLang('en')">English</button>
      <button class="pill-btn" onclick="setLang('ja')">日本語</button>
    </div>
    <button id="changeKeyBtn" onclick="changeKey()" style="font-size:12px; color:var(--text3); background:none; border:none; cursor:pointer; text-decoration:underline;">更換 Key</button>
  </div>

  <div class="topic-grid" id="topicGrid">
    <button class="topic-btn active" onclick="setTopic(this,'creative')">🎨 文創影視</button>
    <button class="topic-btn" onclick="setTopic(this,'culture')">🏛️ 文化政治</button>
    <button class="topic-btn" onclick="setTopic(this,'travel')">✈️ 旅遊</button>
    <button class="topic-btn" onclick="setTopic(this,'taiwan')">🍜 台灣文化飲食</button>
    <button class="topic-btn" onclick="setTopic(this,'free')">💬 自由對話</button>
  </div>

  <div class="speed-row">
    <span>語速</span>
    <input type="range" id="speedSlider" min="0.7" max="1.4" step="0.05" value="1.05" oninput="updateSpeed(this.value)">
    <span id="speedLabel">1.05×</span>
  </div>

  <div class="chat" id="chat"></div>

  <div class="controls">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>
    <div class="input-wrap">
      <textarea id="textInput" placeholder="或直接打字… (Enter 送出)" onkeydown="handleKey(event)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendText()">送出</button>
  </div>

  <div class="status"><div class="dot" id="dot"></div><span id="statusTxt">點麥克風開始說話</span></div>
  <div class="error-box" id="errBox"></div>
</div>

<script>
const TOPICS = {
  creative: {
    en: "You are a friendly, encouraging English conversation partner for a Taiwanese creative professional (photography, outdoor media, film, cultural industries). Discuss film, documentary, visual arts, creative industries, photography, streaming, indie culture. Reply in 2-4 natural conversational sentences, then ask a follow-up question. If there is a significant grammar error, add a brief note in parentheses: (Correction: ...).",
    ja: "あなたは台湾のクリエイティブ業界（写真・映像・文化産業）の方のための日本語会話パートナーです。映画、ドキュメンタリー、ビジュアルアーツ、クリエイティブ産業、写真、ストリーミングなどについて自然に話してください。2〜4文で返答し、最後に質問してください。重要な文法ミスがあれば（訂正：…）と添えてください。"
  },
  culture: {
    en: "You are a friendly English conversation partner. Discuss culture, arts policy, social issues, politics, democracy, civil society, and Taiwan's identity. Reply in 2-4 conversational sentences, end with a question. Note grammar errors as (Correction: ...).",
    ja: "文化・社会・政治をテーマにした日本語会話パートナーです。文化政策、民主主義、台湾のアイデンティティなどを自然に話してください。2〜4文で返答し、質問で締めてください。重要な訂正は（訂正：…）で。"
  },
  travel: {
    en: "You are an enthusiastic English travel conversation partner. Discuss travel, destinations, itineraries, solo travel, outdoor adventures, camping, Asia travel. Reply in 2-4 natural sentences, end with a question. Note errors as (Correction: ...).",
    ja: "旅行好きの日本語会話パートナーです。旅行体験、観光地、一人旅、アウトドア、キャンプ、アジア旅行を自然に話してください。2〜4文で返答、最後に質問。訂正は（訂正：…）で。"
  },
  taiwan: {
    en: "You are an English conversation partner knowledgeable about Taiwan. Discuss Taiwanese food, night markets, festivals, Tainan's history and cuisine, bubble tea, and Taiwan's multicultural heritage (Hokkien, Japanese, Chinese influences). Reply in 2-4 sentences, end with a question. Note errors as (Correction: ...).",
    ja: "台湾文化に詳しい日本語会話パートナーです。台湾料理、夜市、台南の歴史・食文化、タピオカ、台湾の多文化背景を自然に話してください。2〜4文で返答、最後に質問。訂正は（訂正：…）で。"
  },
  free: {
    en: "You are a warm, natural English conversation partner. Engage casually on any topic. Be genuinely curious. Note significant grammar errors as (Correction: ...). Keep it flowing and natural.",
    ja: "温かみのある日本語会話パートナーです。何でもテーマに自由に話してください。重要な文法ミスは（訂正：…）で添えてください。"
  }
};

const GREET = {
  creative: { en:"Hi! Let's talk about creative industries and film. What have you been watching or working on lately?", ja:"こんにちは！映画やクリエイティブ産業について話しましょう。最近気になっている作品や仕事はありますか？" },
  culture:  { en:"Hi! Let's discuss culture and society. Is there something in the news or a social issue you've been thinking about?", ja:"こんにちは！文化や社会について話しましょう。最近気になっているニュースや社会問題はありますか？" },
  travel:   { en:"Hi! Let's talk travel. Have you been anywhere interesting recently, or somewhere you're dreaming about?", ja:"こんにちは！旅行について話しましょう。最近行ったところや、行きたい場所はありますか？" },
  taiwan:   { en:"Hi! Let's talk about Taiwan's culture and food. What's your favorite Tainan dish?", ja:"こんにちは！台湾文化や料理について話しましょう。台南で好きな料理はありますか？" },
  free:     { en:"Hi! I'm your conversation partner. What's on your mind today?", ja:"こんにちは！会話パートナーです。今日は何について話しましょうか？" }
};

let lang = 'en', topic = 'creative', isRec = false, isBusy = false;
let recognition = null, synth = window.speechSynthesis;
let history = [], speakRate = 1.05;
let synthKeepAlive = null;

const hasSR = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// --- API Key management ---
function getKey() { return localStorage.getItem('anthropic_key') || ''; }

function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k.startsWith('sk-ant-')) { alert('請確認 Key 格式正確（sk-ant- 開頭）'); return; }
  localStorage.setItem('anthropic_key', k);
  document.getElementById('keyInput').value = '';
  showMainApp();
}

function changeKey() {
  localStorage.removeItem('anthropic_key');
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('keyInput').value = '';
}

function showMainApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  resetChat();
}

// On load: check if key exists
window.addEventListener('load', () => {
  if (getKey()) { showMainApp(); }
});

// --- Speech synthesis keepalive (fixes Chrome pause bug) ---
function startKeepAlive() {
  stopKeepAlive();
  synthKeepAlive = setInterval(() => {
    if (synth.speaking) { synth.pause(); synth.resume(); }
  }, 10000);
}
function stopKeepAlive() {
  if (synthKeepAlive) { clearInterval(synthKeepAlive); synthKeepAlive = null; }
}

function updateSpeed(v) {
  speakRate = parseFloat(v);
  document.getElementById('speedLabel').textContent = parseFloat(v).toFixed(2) + '×';
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('#langRow .pill-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&l==='en')||(i===1&&l==='ja')));
  resetChat();
}

function setTopic(el, t) {
  topic = t;
  document.querySelectorAll('#topicGrid .topic-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  resetChat();
}

function resetChat() {
  history = [];
  document.getElementById('chat').innerHTML = '';
  const g = GREET[topic][lang];
  addMsg('ai', g);
  speak(g);
}

function addMsg(role, text, correction) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div'); wrap.className = 'msg ' + role;
  const lbl = document.createElement('div'); lbl.className = 'msg-label';
  lbl.textContent = role === 'ai' ? (lang==='en'?'Partner':'パートナー') : (lang==='en'?'You':'あなた');
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  wrap.appendChild(lbl); wrap.appendChild(bub);
  if (correction) {
    const c = document.createElement('div'); c.className = 'correction'; c.textContent = correction; wrap.appendChild(c);
  }
  if (role === 'ai') {
    const rb = document.createElement('button'); rb.className = 'replay-btn';
    rb.innerHTML = '🔁 ' + (lang==='en'?'Replay':'もう一度聴く');
    const capturedText = text;
    rb.onclick = () => speak(capturedText);
    wrap.appendChild(rb);
  }
  chat.appendChild(wrap); chat.scrollTop = chat.scrollHeight;
}

function setStatus(state, txt) {
  document.getElementById('dot').className = 'dot ' + (state||'');
  document.getElementById('statusTxt').textContent = txt;
}

function showErr(msg) {
  const b = document.getElementById('errBox'); b.style.display = msg ? 'block' : 'none'; b.textContent = msg || '';
}

function toggleMic() {
  if (!hasSR) { showErr('你的瀏覽器不支援語音輸入。請用 Chrome 或 Safari 開啟。'); return; }
  if (isRec) { stopMic(); return; }
  startMic();
}

function startMic() {
  if (isBusy) return;
  showErr('');
  synth.cancel();
  recognition = new SR();
  recognition.lang = lang === 'en' ? 'en-US' : 'ja-JP';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  isRec = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micBtn').textContent = '⏹️';
  setStatus('listening', lang==='en'?'Listening… tap to stop':'聞いています…タップで停止');
  recognition.onresult = e => {
    const t = e.results[0][0].transcript.trim();
    document.getElementById('textInput').value = t;
    stopMic(); processInput(t);
  };
  recognition.onerror = e => {
    stopMic();
    if (e.error === 'not-allowed') showErr('麥克風權限被拒絕。請在瀏覽器設定中允許麥克風，然後重新整理頁面。');
    else if (e.error === 'no-speech') setStatus('', lang==='en'?'No speech detected. Try again.':'聞き取れませんでした。もう一度。');
    else showErr('語音辨識錯誤：' + e.error);
  };
  recognition.onend = () => { if (isRec) stopMic(); };
  recognition.start();
}

function stopMic() {
  isRec = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').textContent = '🎙️';
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } }

function sendText() {
  const v = document.getElementById('textInput').value.trim();
  if (!v || isBusy) return;
  document.getElementById('textInput').value = '';
  processInput(v);
}

async function processInput(text) {
  if (!text) return;
  synth.cancel(); stopKeepAlive();
  addMsg('user', text);
  isBusy = true;
  setStatus('thinking', lang==='en'?'Partner is thinking…':'考えています…');
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('micBtn').disabled = true;
  history.push({ role:'user', content:text });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': getKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:TOPICS[topic][lang], messages:history })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error ' + res.status);
    const reply = data.content?.[0]?.text || '...';
    history.push({ role:'assistant', content:reply });

    let mainText = reply, correction = null;
    const m = reply.match(/\((?:Correction|訂正)[：:]\s*([^)]+)\)/);
    if (m) { correction = m[0].slice(1,-1); mainText = reply.replace(m[0],'').trim(); }

    addMsg('ai', mainText, correction);
    speak(mainText);
  } catch(e) {
    showErr('API 錯誤：' + e.message);
    setStatus('', '');
  }
  isBusy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('micBtn').disabled = false;
  if (!isRec) setStatus('', lang==='en'?'Tap mic to speak':'マイクをタップして話す');
}

function speak(text) {
  synth.cancel(); stopKeepAlive();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === 'en' ? 'en-US' : 'ja-JP';
  u.rate = speakRate;
  u.pitch = 1;
  u.onstart = () => { setStatus('speaking', lang==='en'?'Partner speaking…':'話しています…'); startKeepAlive(); };
  u.onend = () => { stopKeepAlive(); setStatus('', lang==='en'?'Tap mic to speak':'マイクをタップして話す'); };
  synth.speak(u);
}
</script>
</body>
</html>
